<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Скорочитайка — тренажёр скорочтения</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body {
            font-family: 'Arial', 'Comfortaa', sans-serif;
            background: linear-gradient(135deg, #e0f0ff 0%, #b8d8fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .main-container {
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 800px;
            padding: 24px 20px 32px;
            text-align: center;
        }
        .header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .owl { font-size: 48px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
        h1 { font-size: 1.8rem; color: #2c5f8a; }
        .form-box { background: #f9f5e8; border-radius: 32px; padding: 20px; margin: 15px 0; }
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #2c5f8a; font-size: 0.9rem; }
        .input-group input { width: 100%; padding: 14px 16px; font-size: 1rem; border: 2px solid #d4e2f0; border-radius: 30px; outline: none; background: white; }
        .input-group input:focus { border-color: #ff9f4a; }
        .btn { width: 100%; padding: 14px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; margin-top: 8px; transition: transform 0.1s; }
        .btn-primary { background-color: #4caf50; color: white; box-shadow: 0 4px 0 #2e6b31; }
        .btn-secondary { background-color: #ff9800; color: white; box-shadow: 0 4px 0 #b26500; }
        .btn-danger { background-color: #f44336; color: white; box-shadow: 0 4px 0 #a31f1f; }
        .btn:active { transform: scale(0.97); }
        .toggle-link { color: #ff9800; font-weight: bold; cursor: pointer; margin-top: 12px; display: inline-block; }
        .error-msg { color: #f44336; font-size: 0.8rem; margin-top: 10px; min-height: 36px; }
        .word-window { background: #f9f5e8; border-radius: 32px; padding: 40px 20px; margin: 20px 0; border: 2px solid #ffe0a3; }
        #word { font-size: 3.5rem; font-weight: bold; color: #1f4e6e; transition: opacity 0.3s ease-in-out; opacity: 1; word-break: break-word; }
        .fade-out { opacity: 0 !important; }
        .speed-control { background: #eef2f7; padding: 15px; border-radius: 60px; margin: 15px 0; }
        .speed-label { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .speed-icon { font-size: 1.2rem; background: white; padding: 4px 12px; border-radius: 40px; }
        input[type="range"] { width: 100%; height: 8px; -webkit-appearance: none; background: #cbdbe6; border-radius: 5px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #ff9f4a; border-radius: 50%; cursor: pointer; }
        .speed-value { background: #2c5f8a; display: inline-block; padding: 5px 20px; border-radius: 30px; color: white; font-size: 0.9rem; margin-top: 10px; }
        .controls { display: flex; justify-content: center; gap: 15px; margin: 20px 0; flex-wrap: wrap; }
        .controls button { width: auto; padding: 10px 24px; margin: 0; }
        .user-info { background: #eef2f7; padding: 8px 16px; border-radius: 40px; display: inline-block; margin-bottom: 15px; font-size: 0.9rem; color: #2c5f8a; }
        .info { background: #eef2f7; padding: 12px; border-radius: 28px; font-size: 0.85rem; color: #2c5f8a; margin-top: 15px; }
        @media (max-width: 550px) { .main-container { padding: 20px 16px; } #word { font-size: 2.2rem; } .btn { padding: 10px; font-size: 1rem; } .controls button { padding: 8px 16px; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header">
        <div class="owl">🦉</div>
        <h1>Скорочитайка</h1>
        <div class="owl">📖</div>
    </div>

    <!-- Блок входа/регистрации -->
    <div id="authBlock">
        <div class="form-box">
            <div id="loginSection">
                <div class="input-group">
                    <label>📧 Email</label>
                    <input type="email" id="loginEmail" placeholder="Введи email">
                </div>
                <div class="input-group">
                    <label>🔒 Пароль</label>
                    <input type="password" id="loginPassword" placeholder="Введи пароль">
                </div>
                <button class="btn btn-primary" id="loginBtn">🚪 Войти в тренажёр</button>
                <div class="toggle-link" id="showRegisterBtn">📝 Нет аккаунта? Зарегистрироваться</div>
            </div>

            <div id="registerSection" style="display: none;">
                <div class="input-group">
                    <label>📧 Email</label>
                    <input type="email" id="regEmail" placeholder="Твой email">
                </div>
                <div class="input-group">
                    <label>🔒 Пароль (минимум 6 символов)</label>
                    <input type="password" id="regPassword" placeholder="Придумай пароль">
                </div>
                <div class="input-group">
                    <label>🔁 Повтори пароль</label>
                    <input type="password" id="regPasswordConfirm" placeholder="Повтори пароль">
                </div>
                <button class="btn btn-primary" id="registerBtn">✅ Зарегистрироваться</button>
                <div class="toggle-link" id="showLoginBtn">◀ Назад к входу</div>
            </div>

            <div id="authMessage" class="error-msg"></div>
        </div>
    </div>

    <!-- Блок тренажёра (скрыт, пока не войдут) -->
    <div id="trainerBlock" style="display: none;">
        <div class="user-info" id="userDisplay"></div>

        <div class="word-window">
            <div id="word">Привет!</div>
        </div>

        <div class="speed-control">
            <div class="speed-label">
                <span class="speed-icon">🐢 Черепаха</span>
                <span class="speed-icon">⚡ Гепард 🐆</span>
            </div>
            <input type="range" id="speedSlider" min="0" max="100" value="30">
            <div class="speed-value" id="speedDisplay">Скорость: средняя</div>
        </div>

        <div class="controls">
            <button class="btn-primary" id="startBtn">▶ Старт</button>
            <button class="btn-secondary" id="pauseBtn">⏸ Пауза</button>
            <button class="btn-danger" id="stopBtn">⏹ Стоп</button>
        </div>

        <div class="controls">
            <button class="btn-secondary" id="logoutBtn" style="background:#6c757d; box-shadow:0 4px 0 #495057;">🚪 Выйти</button>
        </div>

        <div class="info">
            🌟 Слова появляются по одному. Смотри в центр экрана!<br>
            🎯 Двигай ползунок, чтобы менять скорость.
        </div>
    </div>
</div>

<script type="module">

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCARFGgCOg2-9o3moFlk3aESd2JzFZ2V1M",
  authDomain: "speedread-18a13.firebaseapp.com",
  projectId: "speedread-18a13",
  storageBucket: "speedread-18a13.firebasestorage.app",
  messagingSenderId: "4455609998",
  appId: "1:4455609998:web:3a60fcc4468c88a248bbdf",
  measurementId: "G-X1T4ZLYRM5"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
    // ============================================================

    // Импорт Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Элементы DOM
    const authBlock = document.getElementById('authBlock');
    const trainerBlock = document.getElementById('trainerBlock');
    const userDisplay = document.getElementById('userDisplay');
    const authMessage = document.getElementById('authMessage');

    // Переключение между формами
    const loginSection = document.getElementById('loginSection');
    const registerSection = document.getElementById('registerSection');
    document.getElementById('showRegisterBtn').addEventListener('click', () => {
        loginSection.style.display = 'none';
        registerSection.style.display = 'block';
        authMessage.textContent = '';
    });
    document.getElementById('showLoginBtn').addEventListener('click', () => {
        registerSection.style.display = 'none';
        loginSection.style.display = 'block';
        authMessage.textContent = '';
    });

    // РЕГИСТРАЦИЯ
    document.getElementById('registerBtn').addEventListener('click', async () => {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirm = document.getElementById('regPasswordConfirm').value.trim();

        if (!email || !password) {
            authMessage.textContent = '❌ Заполни email и пароль!';
            return;
        }
        if (password !== confirm) {
            authMessage.textContent = '❌ Пароли не совпадают!';
            return;
        }
        if (password.length < 6) {
            authMessage.textContent = '❌ Пароль должен быть не менее 6 символов!';
            return;
        }

        try {
            await createUserWithEmailAndPassword(auth, email, password);
            authMessage.style.color = '#4caf50';
            authMessage.textContent = '✅ Регистрация успешна!';
        } catch (error) {
            let errorText = '❌ ';
            if (error.code === 'auth/email-already-in-use') errorText += 'Этот email уже используется';
            else if (error.code === 'auth/invalid-email') errorText += 'Неверный формат email';
            else errorText += error.message;
            authMessage.style.color = '#f44336';
            authMessage.textContent = errorText;
        }
    });

    // ВХОД
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();

        if (!email || !password) {
            authMessage.textContent = '❌ Введи email и пароль!';
            return;
        }

        try {
            await signInWithEmailAndPassword(auth, email, password);
            authMessage.textContent = '';
        } catch (error) {
            let errorText = '❌ ';
            if (error.code === 'auth/user-not-found') errorText += 'Пользователь не найден';
            else if (error.code === 'auth/wrong-password') errorText += 'Неверный пароль';
            else if (error.code === 'auth/invalid-email') errorText += 'Неверный формат email';
            else errorText += error.message;
            authMessage.style.color = '#f44336';
            authMessage.textContent = errorText;
        }
    });

    // ВЫХОД
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await signOut(auth);
    });

    // ОТСЛЕЖИВАНИЕ СОСТОЯНИЯ ВХОДА
    let isRunning = false;
    let intervalId = null;
    let currentIndex = 0;
    const wordsList = ["Привет", "друг", "сегодня", "мы", "будем", "тренировать", "скорочтение", "Смотри", "внимательно", "на", "центр", "экрана", "Слова", "будут", "меняться", "Старайся", "не", "отвлекаться", "У", "тебя", "всё", "получится", "Отлично", "Продолжай", "Ты", "молодец", "Так", "держать", "Ещё", "немного", "Финиш"];
    const wordElement = document.getElementById('word');
    const speedSlider = document.getElementById('speedSlider');
    const speedDisplaySpan = document.getElementById('speedDisplay');

    function getDelayMs() {
        const val = parseInt(speedSlider.value);
        return Math.round(1800 - (val / 100) * (1800 - 250));
    }
    function updateSpeedDisplay() {
        const val = parseInt(speedSlider.value);
        if (val < 20) speedDisplaySpan.textContent = "🐢 Очень медленно";
        else if (val < 45) speedDisplaySpan.textContent = "🚶‍♂️ Медленно";
        else if (val < 70) speedDisplaySpan.textContent = "🚴‍♀️ Средне";
        else if (val < 90) speedDisplaySpan.textContent = "🚗 Быстро";
        else speedDisplaySpan.textContent = "🐆 Очень быстро (Гепард)";
    }
    function changeWord() {
        wordElement.classList.add('fade-out');
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % wordsList.length;
            wordElement.textContent = wordsList[currentIndex];
            wordElement.classList.remove('fade-out');
        }, 250);
    }
    function startTrainer() {
        if (intervalId) clearInterval(intervalId);
        isRunning = true;
        intervalId = setInterval(changeWord, getDelayMs());
    }
    function stopTrainer() {
        if (intervalId) { clearInterval(intervalId); intervalId = null; }
        isRunning = false;
        wordElement.classList.remove('fade-out');
        wordElement.textContent = wordsList[0];
        currentIndex = 0;
    }
    function pauseTrainer() {
        if (intervalId) { clearInterval(intervalId); intervalId = null; isRunning = false; }
    }
    speedSlider.addEventListener('input', () => {
        updateSpeedDisplay();
        if (isRunning) {
            if (intervalId) clearInterval(intervalId);
            intervalId = setInterval(changeWord, getDelayMs());
        }
    });
    document.getElementById('startBtn').addEventListener('click', startTrainer);
    document.getElementById('pauseBtn').addEventListener('click', pauseTrainer);
    document.getElementById('stopBtn').addEventListener('click', stopTrainer);
    updateSpeedDisplay();

    onAuthStateChanged(auth, (user) => {
        if (user) {
            authBlock.style.display = 'none';
            trainerBlock.style.display = 'block';
            userDisplay.innerHTML = `👋 Привет, ${user.email}!`;
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('regEmail').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regPasswordConfirm').value = '';
            if (!isRunning) startTrainer();
        } else {
            trainerBlock.style.display = 'none';
            authBlock.style.display = 'block';
            loginSection.style.display = 'block';
            registerSection.style.display = 'none';
            authMessage.textContent = '';
            stopTrainer();
        }
    });
</script>

</body>
</html>
